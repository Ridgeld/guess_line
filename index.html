<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Угадай линию</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="wrapper">
        <div class="content">
            <header>
                <div class="logo outline">D/M</div>
                <div class="label outline">Плоскости и линии</div>
            </header>
            
            <header class="line-name">
                <h1 id="title">Угадай линию</h1>
                <button id="steerBtn">?</button>
            </header>

            <div class="game-container">
                <canvas id="gridCanvas" width="220" height="220"></canvas>
                <canvas id="confettiCanvas" class="confetti-overlay"></canvas>
                
                <div class="controls">
                    <div class="options-container" id="optionsContainer"></div>
                    <!-- <button id="submitBtn">Ответить</button> -->
                </div>

                <div id="popup">Попробуй еще</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
